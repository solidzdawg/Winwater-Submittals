name: Build Submittal Package

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project folder name (e.g. Double-RR)'
        required: true
        default: 'Double-RR'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 \
            libffi-dev libcairo2 fonts-dejavu-core fonts-dejavu-extra

      - name: Install Python packages
        run: pip install pypdf weasyprint

      - name: Build submittal package
        run: python scripts/build-package.py --project "${{ github.event.inputs.project }}"

      - name: Show output
        run: |
          echo "=== Output ==="
          find submittals/${{ github.event.inputs.project }} -maxdepth 1 \( -name '*.pdf' -o -name '*.txt' \) | sort
          FINAL=$(find submittals/${{ github.event.inputs.project }} -maxdepth 1 -name '*.pdf' -type f)
          if [ -n "$FINAL" ]; then ls -lh $FINAL; fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add submittals/${{ github.event.inputs.project }}/*.pdf \
                  submittals/${{ github.event.inputs.project }}/assembly-log.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat: assemble ${{ github.event.inputs.project }} submittal package [automated]"
          git push
