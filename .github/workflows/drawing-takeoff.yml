name: Extract Drawing Takeoff

on:
  workflow_dispatch:
    inputs:
      sources:
        description: Path to the sources JSON file
        required: true
        default: projects/Double-RR/sources.example.json
      model:
        description: OpenAI model to use for multimodal extraction
        required: false
        default: gpt-5
      inventory_only:
        description: Skip model extraction and only produce page inventory
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drawing takeoff pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          args=(--sources "${{ inputs.sources }}" --output-dir "_output/drawing-takeoff")
          if [ "${{ inputs.inventory_only }}" = "true" ]; then
            args+=(--inventory-only)
          else
            args+=(--model "${{ inputs.model }}")
          fi
          python scripts/extract_drawing_takeoff.py "${args[@]}"

      - name: Upload extraction artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drawing-takeoff-output
          path: _output/drawing-takeoff
