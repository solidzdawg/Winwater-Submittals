name: Sync Vendor Docs from Winwater-Docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Submittals repo
        uses: actions/checkout@v4

      - name: Checkout Winwater-Docs repo
        uses: actions/checkout@v4
        with:
          repository: solidzdawg/Winwater-Docs
          token: ${{ secrets.DOCS_TOKEN }}
          path: _docs-repo
          sparse-checkout: vendor-parts

      - name: Copy vendor PDFs into vendor-docs/
        run: |
          for dir in _docs-repo/vendor-parts/*/; do
            mfr=$(basename "$dir")
            # Skip if not a real manufacturer folder
            [ "$mfr" = "*" ] && continue

            # Copy Cut-Sheets
            if [ -d "$dir/Cut-Sheets" ]; then
              mkdir -p "vendor-docs/$mfr/Cut-Sheets"
              cp "$dir/Cut-Sheets/"*.pdf "vendor-docs/$mfr/Cut-Sheets/" 2>/dev/null || true
            fi

            # Copy Certifications
            if [ -d "$dir/Certifications" ]; then
              mkdir -p "vendor-docs/$mfr/Certifications"
              cp "$dir/Certifications/"*.pdf "vendor-docs/$mfr/Certifications/" 2>/dev/null || true
            fi

            # Copy Installation-Manuals
            if [ -d "$dir/Installation-Manuals" ]; then
              mkdir -p "vendor-docs/$mfr/Installation-Manuals"
              cp "$dir/Installation-Manuals/"*.pdf "vendor-docs/$mfr/Installation-Manuals/" 2>/dev/null || true
            fi
          done

          echo "=== Synced vendor docs ==="
          find vendor-docs -name '*.pdf' -type f | sort
          echo "========================="
          echo "Total PDFs: $(find vendor-docs -name '*.pdf' -type f | wc -l)"

      - name: Clean up Docs checkout
        run: rm -rf _docs-repo

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendor-docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: sync vendor cut sheet PDFs from Winwater-Docs [automated]"
          git push
