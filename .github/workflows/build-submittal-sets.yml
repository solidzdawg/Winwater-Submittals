name: Build Submittal Sets

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-submittal-sets.py'
      - 'submittals/*/manifest.csv'
      - 'templates/**'
      - '.github/workflows/build-submittal-sets.yml'
      - 'TRIGGER_BUILD'
  workflow_dispatch:
    inputs:
      project:
        description: 'Project folder name (e.g. Double-RR)'
        required: true
        default: 'Double-RR'
      inspect_only:
        description: 'Inspect templates only (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip if this commit was made by the bot (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[automated]')"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libreoffice
          echo "--- LibreOffice info ---"
          libreoffice --version 2>&1 || true
          which libreoffice 2>&1 || true
          echo "--- done ---"

      - name: Install Python packages
        run: |
          pip install pypdf openpyxl python-docx
          python -c "import pypdf; import openpyxl; from docx import Document; print('All packages OK')"

      - name: Debug - list templates and vendor docs
        run: |
          echo "=== Templates ==="
          ls -la templates/ 2>/dev/null || echo "No templates dir"
          echo ""
          echo "=== Vendor docs ==="
          find vendor-docs -name '*.pdf' -type f 2>/dev/null | head -25 || echo "No vendor docs"
          echo ""
          echo "=== Manifest ==="
          cat submittals/Double-RR/manifest.csv 2>/dev/null | head -5 || echo "No manifest"

      - name: Determine project name
        id: project
        run: |
          if [ -n "${{ github.event.inputs.project }}" ]; then
            echo "name=${{ github.event.inputs.project }}" >> $GITHUB_OUTPUT
          else
            echo "name=Double-RR" >> $GITHUB_OUTPUT
          fi

      - name: Inspect templates
        if: ${{ github.event.inputs.inspect_only == 'true' }}
        run: python scripts/build-submittal-sets.py --project "${{ steps.project.outputs.name }}" --inspect

      - name: Build 11 submittal sets
        if: ${{ github.event.inputs.inspect_only != 'true' }}
        run: python scripts/build-submittal-sets.py --project "${{ steps.project.outputs.name }}"

      - name: List generated PDFs
        if: ${{ github.event.inputs.inspect_only != 'true' }}
        run: |
          echo "=== Generated Submittal Set PDFs ==="
          find submittals/${{ steps.project.outputs.name }}/sets -name '*.pdf' -type f 2>/dev/null | sort || echo "No sets dir"
          echo "===================================="
          ls -lh submittals/${{ steps.project.outputs.name }}/sets/*.pdf 2>/dev/null || echo "No PDFs found"

      - name: Commit submittal sets
        if: ${{ github.event.inputs.inspect_only != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add submittals/${{ steps.project.outputs.name }}/sets/*.pdf 2>/dev/null || true
          # Also remove trigger file if it exists
          git rm TRIGGER_BUILD 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "feat: build ${{ steps.project.outputs.name }} submittal sets (11 PDFs) [automated]"
          git push
